name: Run Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the uploaded test results artifact"
        value: ${{ jobs.test.outputs.artifact-name }}

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.upload.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        # continue-on-error is CRITICAL — failures become data for the AI, not pipeline stoppers
        continue-on-error: true
        run: npx playwright test --reporter=json 2>&1 | tee test-results/results.json

      - name: Upload test results
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/results.json
          retention-days: 7
